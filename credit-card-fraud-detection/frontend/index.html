<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      color: #555;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px 32px;
      width: 100%;
      max-width: 760px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }

    .presets {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1.5px solid #d0d0d0;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }

    .preset-btn:hover { border-color: #4361ee; color: #4361ee; }
    .preset-btn.fraud-preset { border-color: #e63946; color: #e63946; }
    .preset-btn.fraud-preset:hover { background: #fff0f0; }
    .preset-btn.legit-preset { border-color: #2a9d8f; color: #2a9d8f; }
    .preset-btn.legit-preset:hover { background: #f0faf9; }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .field input {
      padding: 8px 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: border-color 0.15s;
      width: 100%;
    }

    .field input:focus {
      outline: none;
      border-color: #4361ee;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      grid-column: 1 / -1;
      margin-top: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #f0f0f0;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: #3451d1; }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      border-radius: 10px;
      padding: 20px 24px;
      display: none;
    }

    .result.fraud {
      background: #fff0f0;
      border: 1.5px solid #e63946;
    }

    .result.legitimate {
      background: #f0faf9;
      border: 1.5px solid #2a9d8f;
    }

    .result-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .result.fraud .result-label { color: #e63946; }
    .result.legitimate .result-label { color: #2a9d8f; }

    .result-verdict {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .result.fraud .result-verdict { color: #c1121f; }
    .result.legitimate .result-verdict { color: #1b7a6e; }

    .prob-bar-wrap {
      background: #e8e8e8;
      border-radius: 999px;
      height: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .prob-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .result.fraud .prob-bar { background: #e63946; }
    .result.legitimate .prob-bar { background: #2a9d8f; }

    .prob-text {
      font-size: 0.88rem;
      color: #555;
    }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      font-size: 0.88rem;
      color: #856404;
      display: none;
    }

    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Credit Card Fraud Detection</h1>
  <p>XGBoost model trained on 284k transactions &mdash; load a preset or enter values manually</p>
</header>

<div class="card">
  <h2>Transaction</h2>

  <div class="presets">
    <button class="preset-btn fraud-preset" onclick="loadPreset('fraud')">Load fraud example</button>
    <button class="preset-btn legit-preset" onclick="loadPreset('legit')">Load legitimate example</button>
    <button class="preset-btn" onclick="clearForm()">Clear</button>
  </div>

  <form id="txn-form">
    <div class="fields-grid">
      <div class="section-label">Transaction info</div>
      <div class="field">
        <label>Time (seconds)</label>
        <input type="number" step="any" name="Time" placeholder="e.g. 406" required />
      </div>
      <div class="field">
        <label>Amount ($)</label>
        <input type="number" step="any" name="Amount" placeholder="e.g. 149.62" required />
      </div>

      <div class="section-label">PCA features (V1 – V28)</div>
      <!-- V fields injected by JS -->
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">Score transaction</button>
  </form>

  <div class="result" id="result">
    <div class="result-label">Prediction</div>
    <div class="result-verdict" id="result-verdict"></div>
    <div class="prob-bar-wrap">
      <div class="prob-bar" id="prob-bar" style="width:0%"></div>
    </div>
    <div class="prob-text" id="prob-text"></div>
  </div>

  <div class="error" id="error-box"></div>
</div>

<footer>Model: XGBoost &nbsp;|&nbsp; Threshold: cost-optimised at 0.782 &nbsp;|&nbsp; PR-AUC: 0.877</footer>

<script>
  const API = "http://localhost:8000/predict";

  // Inject V1–V28 fields
  const grid = document.querySelector(".fields-grid");
  for (let i = 1; i <= 28; i++) {
    const div = document.createElement("div");
    div.className = "field";
    div.innerHTML = `<label>V${i}</label><input type="number" step="any" name="V${i}" placeholder="0.00" required />`;
    grid.appendChild(div);
  }

  // Real examples from the Kaggle dataset
  const PRESETS = {
    fraud: {
      Time: 80219, Amount: 368.03,
      V1: -2.3122265423263, V2: 1.95199201064158, V3: -1.60985073229769,
      V4: 3.9979055875468, V5: -0.522187864667764, V6: -1.42654531920595,
      V7: -2.53738730624579, V8: 1.39165724829804, V9: -2.77008927719433,
      V10: -2.77227214465915, V11: 3.20203320709635, V12: -2.89990738849473,
      V13: -0.595221881324605, V14: -4.28925378244217, V15: 0.389724120274487,
      V16: -1.14074717980657, V17: -2.83005567450437, V18: -0.0168224681808257,
      V19: 0.416955705037907, V20: 0.126910559061474, V21: 0.517232370861764,
      V22: -0.0350493686052974, V23: -0.465211076182388, V24: 0.320198198514526,
      V25: 0.0445191674731724, V26: 0.177839798284401, V27: 0.261145002567677,
      V28: -0.143275874698919
    },
    legit: {
      Time: 52956, Amount: 25.00,
      V1: 1.19185711131486, V2: 0.26615071205963, V3: 0.16648011335321,
      V4: 0.44815408489287, V5: 0.06001765581561, V6: -0.08236080671497,
      V7: -0.07880298012089, V8: 0.08510165386461, V9: -0.25542782529075,
      V10: -0.16697440578764, V11: 1.61272666105479, V12: 1.06523531137287,
      V13: 0.48909501589608, V14: -0.14377230560309, V15: 0.63500171358788,
      V16: 0.46391704624946, V17: -0.11480065770820, V18: -0.18336127323987,
      V19: -0.14578304154599, V20: -0.06908533731008, V21: -0.22577482596175,
      V22: -0.63867970235222, V23: 0.10128802620528, V24: -0.33984647737067,
      V25: 0.16717040696168, V26: 0.12589446783869, V27: -0.00898309914322,
      V28: 0.01472416648530
    }
  };

  function loadPreset(type) {
    const data = PRESETS[type];
    document.querySelectorAll("#txn-form input").forEach(input => {
      if (data[input.name] !== undefined) input.value = data[input.name];
    });
    hideResult();
  }

  function clearForm() {
    document.getElementById("txn-form").reset();
    hideResult();
  }

  function hideResult() {
    document.getElementById("result").style.display = "none";
    document.getElementById("error-box").style.display = "none";
  }

  document.getElementById("txn-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Scoring…";
    hideResult();

    const payload = {};
    document.querySelectorAll("#txn-form input").forEach(input => {
      payload[input.name] = parseFloat(input.value);
    });

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "API error");
      }

      const data = await res.json();
      showResult(data);
    } catch (err) {
      const box = document.getElementById("error-box");
      box.textContent = `Error: ${err.message}. Make sure the API is running (uvicorn api.main:app --reload).`;
      box.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "Score transaction";
    }
  });

  function showResult(data) {
    const isFraud = data.prediction === "fraud";
    const pct = Math.round(data.fraud_probability * 100);

    const resultEl = document.getElementById("result");
    resultEl.className = `result ${data.prediction}`;
    resultEl.style.display = "block";

    document.getElementById("result-verdict").textContent =
      isFraud ? "Fraud detected" : "Legitimate";

    document.getElementById("prob-bar").style.width = `${pct}%`;
    document.getElementById("prob-text").textContent =
      `Fraud probability: ${pct}%  ·  threshold: ${Math.round(data.threshold * 100)}%`;
  }
</script>
</body>
</html>
