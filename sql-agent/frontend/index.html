<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { margin-top: 6px; color: #555; font-size: 0.95rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 28px 32px;
      width: 100%;
      max-width: 820px;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .example-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #d0d0d0;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #444;
      transition: all 0.15s;
    }

    .example-btn:hover { border-color: #4361ee; color: #4361ee; }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.15s;
    }

    .input-row input:focus { outline: none; border-color: #4361ee; }

    .input-row button {
      padding: 11px 22px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3451d1; }
    .input-row button:disabled { background: #a0aec0; cursor: not-allowed; }

    .result { display: none; }

    .answer-box {
      background: #f0f4ff;
      border: 1.5px solid #4361ee;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .answer-box .label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #4361ee;
      margin-bottom: 6px;
    }

    .answer-box .answer-text {
      font-size: 1rem;
      color: #1a1a2e;
      line-height: 1.5;
    }

    .meta {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 16px;
    }

    .sql-box {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
      overflow-x: auto;
    }

    .sql-box .label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #888;
      margin-bottom: 8px;
    }

    .sql-box pre {
      color: #a6e3a1;
      font-family: "Fira Code", "Courier New", monospace;
      font-size: 0.88rem;
      white-space: pre-wrap;
    }

    .table-wrap { overflow-x: auto; margin-bottom: 16px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th {
      background: #f4f5f7;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #e0e0e0;
    }

    td {
      padding: 7px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    tr:last-child td { border-bottom: none; }

    .history-section { margin-top: 8px; }

    .history-toggle {
      background: none;
      border: none;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
      margin-bottom: 10px;
    }

    .history-toggle:hover { color: #444; }

    .history-item {
      border-left: 3px solid #e0e0e0;
      padding-left: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #666;
    }

    .history-item .attempt-label { font-weight: 600; color: #999; margin-bottom: 4px; }
    .history-item .reflection { color: #e63946; margin-top: 4px; }

    .error-box {
      background: #fff0f0;
      border: 1.5px solid #e63946;
      border-radius: 8px;
      padding: 12px 16px;
      color: #c1121f;
      font-size: 0.9rem;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>SQL Agent</h1>
  <p>Ask a question in plain English — the agent writes SQL, executes it, and reflects until it has an answer</p>
</header>

<div class="card">
  <div class="examples">
    <button class="example-btn" onclick="ask('Who are the top 3 customers by total spend?')">Top customers by spend</button>
    <button class="example-btn" onclick="ask('What is the best-selling product category?')">Best-selling category</button>
    <button class="example-btn" onclick="ask('How many orders were delivered vs cancelled?')">Order status breakdown</button>
    <button class="example-btn" onclick="ask('Which customers placed more than one order?')">Repeat customers</button>
    <button class="example-btn" onclick="ask('What is the average order value by country?')">Avg order value by country</button>
    <button class="example-btn" onclick="ask('Which products have never been ordered?')">Products never ordered</button>
  </div>

  <div class="input-row">
    <input type="text" id="question-input" placeholder="Ask anything about the database..." />
    <button id="ask-btn" onclick="submitQuestion()">Ask</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="result" id="result">
    <div class="answer-box">
      <div class="label">Answer</div>
      <div class="answer-text" id="answer-text"></div>
    </div>

    <div class="meta" id="meta"></div>

    <div class="sql-box">
      <div class="label">Final SQL</div>
      <pre id="sql-text"></pre>
    </div>

    <div class="table-wrap" id="table-wrap"></div>

    <div class="history-section" id="history-section" style="display:none">
      <button class="history-toggle" onclick="toggleHistory()">▶ Show agent iterations</button>
      <div id="history-items" style="display:none"></div>
    </div>
  </div>
</div>

<script>
  const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://localhost:8001/ask"
    : `${window.location.origin}/ask`;

  document.getElementById("question-input").addEventListener("keydown", e => {
    if (e.key === "Enter") submitQuestion();
  });

  function ask(q) {
    document.getElementById("question-input").value = q;
    submitQuestion();
  }

  async function submitQuestion() {
    const input = document.getElementById("question-input");
    const question = input.value.trim();
    if (!question) return;

    const btn = document.getElementById("ask-btn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Thinking…';

    document.getElementById("result").style.display = "none";
    document.getElementById("error-box").style.display = "none";

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "API error");
      }

      const data = await res.json();
      renderResult(data);
    } catch (err) {
      const box = document.getElementById("error-box");
      box.textContent = `Error: ${err.message}`;
      box.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "Ask";
    }
  }

  function renderResult(data) {
    document.getElementById("answer-text").textContent = data.answer;
    document.getElementById("sql-text").textContent = data.final_query;
    document.getElementById("meta").textContent =
      `${data.iterations} iteration${data.iterations !== 1 ? "s" : ""}`;

    // Table — re-execute final query result via history or show placeholder
    document.getElementById("table-wrap").innerHTML = "";

    // History
    const historySection = document.getElementById("history-section");
    const historyItems = document.getElementById("history-items");
    historyItems.innerHTML = "";

    if (data.history && data.history.length > 0) {
      historySection.style.display = "block";
      data.history.forEach((h, i) => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <div class="attempt-label">Attempt ${i + 1}</div>
          <div>SQL: <code>${h.query}</code></div>
          <div class="reflection">↳ ${h.reflection}</div>
        `;
        historyItems.appendChild(div);
      });
    } else {
      historySection.style.display = "none";
    }

    document.getElementById("result").style.display = "block";
  }

  let historyOpen = false;
  function toggleHistory() {
    historyOpen = !historyOpen;
    document.getElementById("history-items").style.display = historyOpen ? "block" : "none";
    document.querySelector(".history-toggle").textContent =
      (historyOpen ? "▼" : "▶") + " Show agent iterations";
  }
</script>
</body>
</html>
